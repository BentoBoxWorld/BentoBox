        <red>у Нижньому світі.</red>
      name: PVP у Незері
      hint: PVP у Незері вимкнено
      enabled: '<red>PVP у Незері увімкнено.</red>'
      disabled: '<green>PVP у Незері вимкнено.</green>'
    PVP_OVERWORLD:
