        <green>відновлення росту дитинчат мобів</green>
      hint: Призупинення росту мобів вимкнено
    PRESSURE_PLATE:
      description: Перемикає використання
      name: Натискні плити
      hint: Використання натискних плит вимкнено
    PVP_END:
      description: |-
