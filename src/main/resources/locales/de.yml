        name-has-island: '<red>[name] hat eine Insel. Entferne sie oder lösche sie zuerst!</red>'
        success: '<aqua>[name]</aqua><green> wurde der Insel von </green><aqua>[owner]</aqua><green>hinzugefügt.</green>'
