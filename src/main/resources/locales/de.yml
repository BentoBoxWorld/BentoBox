        description: Erhöht den Schutzbereich der Insel
        parameters: <Spieler> <Reichweite> [Inselstandort]
        success: >-
          <green>Erfolgreiche Erhöhung von </green><aqua>[name]</aqua><green>'s geschützten Bereich der</green>
