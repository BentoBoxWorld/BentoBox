    SONIC_BOOM: Звуковой удар
    WORLD_BORDER: Граница мира

panel:
  credits:
    title: <dark_gray>[name] </dark_gray><dark_green>Титры</dark_green>
    contributor:
      name: <green>[name]</green>
      description: '<green>Коммиты: </green><aqua>[commits]</aqua>'
    empty-here:
      name: <red>Кажется, здесь ничего нет...</red>
      description: |-
        <red>BentoBox не смог найти участников</red>
        <red>для этого дополнения.</red>

        <green>Позвольте BentoBox подключиться к GitHub в</green>
        <green>конфигурации или попробуйте позднее.</green>
# В этом разделе приведены значения для панелей BentoBox.
panels:
  # Раздел переводов, используемых в панели дома.
  island_homes:
    title: <dark_green><bold>Ваши [prefix_island] дома</bold></dark_green>
    buttons:
      # Эта кнопка служит для отображения островов, на которые можно телепортироваться.
      name: <bold>[name]</bold>
  # Раздел переводов, используемых в панели создания
  island_creation:
    title: <dark_green><bold>Выберите [prefix_an-island]</bold></dark_green>
    buttons:
      # Эта кнопка служит для отображения набора чертежей на панели создания острова.
      bundle:
        name: <bold>[name]</bold>
        description: '[description]'
        uses: <green>Использовано [number]/[max]</green>
        unlimited: <green>Неограниченное количество использований разрешено</green>
        cost: '<yellow>Стоимость: [cost]</yellow>'
  language:
    title: <dark_green><bold>Выберите ваш язык</bold></dark_green>
    edited: <red>Изменено на [lang]</red>
    buttons:
      # Эта кнопка служит для отображения различных языковых настроек, доступных на панели выбора языка.
      language:
        name: <white><bold>[name]</bold></white>
        description: |-
          [authors]
          |[selected]
        authors: <gray>Авторы:</gray>
        author: <gray>- </gray><aqua>[name]</aqua>
        selected: <green>Выбрано в данный момент.</green>
  # Раздел переводов, используемый на панели «Предпросмотра заполнителей» (список дополнений верхнего уровня)
  placeholder:
    title: <dark_aqua><bold>Предпросмотр заполнителей</bold></dark_aqua>
    buttons:
      # Кнопка, представляющая группу заполнителей ядра BentoBox.
      bentobox:
        name: <white><bold>BentoBox</bold></white>
        description: <gray>[number] заполнителей</gray>
      # Кнопка, представляющая группу-заполнитель для одного аддона; [name] = название аддона, [number] = количество.
      addon:
        name: <white><bold>[name]</bold></white>
        description: <gray>[number] заполнителей</gray>
  # Раздел переводов, используемый на панели «Список заполнителей» (список заполнителей для каждого источника)
  placeholder-list:
    title: <dark_aqua><bold>[name]</bold></dark_aqua>
    buttons:
      # LEAF — один заполнитель; [placeholder] = полная строка %expansion_id_key%
      leaf:
        name: <aqua>[placeholder]</aqua>
        description: <gray>[description]</gray>
        disabled: <red><italic>(отключено)</italic></red>
        hint: <yellow>Нажмите </yellow><gray>для переключения.</gray>
      # FOLDER — группа подзаполнителей; [label] = сжатый сегмент, [count] = общее количество элементов
      folder:
        name: <white><bold>[label]</bold></white>
        description: <gray>[count] заполнителей</gray>
        hint: <yellow>Нажмите </yellow><gray>для просмотра.</gray>
      # LEAF_FOLDER — заполнитель и папка; нажмите ЛКМ, чтобы переключить, нажмите ПКМ, чтобы открыть.
      leaf-folder:
        hint: <yellow>ЛКМ </yellow><gray>для переключения. · </gray><yellow>ПКМ </yellow><gray>для просмотра.</gray>
      # СЕРИЯ — свернутый числовой ряд; [placeholder] содержит {N}, [count]/[min]/[max] = информация о диапазоне.
      series:
        name: <aqua>[placeholder]</aqua>
        description: <gray>[description]</gray>
        range: '<dark_gray>#[min] – #[max] · [count] элементов</dark_gray>'
        disabled: <red><italic>(некоторые отключены)</italic></red>
        hint: <yellow>Нажмите </yellow><gray>для переключения всех.</gray>
        # Примеры значений для ряда; [index] = числовой суффикс, [value] = вычисленное значение.
        sample: <dark_gray>#[index] → </dark_gray><white>[value]</white>
        sample-empty: <dark_gray>#[index] → </dark_gray><dark_gray>(пусто)</dark_gray>
      # LEAF_SERIES — заполнитель и серия; нажмите ЛКМ, чтобы переключить отображение листа, нажмите ПКМ, чтобы переключить отображение всех.
      leaf-series:
        hint: <yellow>ЛКМ </yellow><gray>для переключения. · </gray><yellow>ПКМ </yellow><gray>для переключения всех.</gray>
      # Текущее значение заполнителя для проигрывателя просмотра.
      value: <dark_gray>→ </dark_gray><white>[value]</white>
      value-empty: <dark_gray>→ </dark_gray><dark_gray>(пусто)</dark_gray>
      back:
        name: <white><bold>Назад</bold></white>
        description: <gray>Вернуться к списку аддонов</gray>
  # Набор общих кнопок, используемых на нескольких панелях.
  buttons:
    # Кнопка, используемая в интерфейсах, которая позволяет вернуться на предыдущую страницу.
    previous:
      name: <white><bold>Предыдущая страница</bold></white>
      description: <gray>Перейти на [number] страницу</gray>
    # Кнопка, используемая в интерфейсах, которая позволяет перейти на следующую страницу.
    next:
      name: <white><bold>Следующая страница</bold></white>
      description: <gray>Перейти на [number] страницу</gray>
  tips:
    click-to-next: <gray><yellow>Нажмите</yellow>, чтобы перейти на следующую страницу.</gray>
    click-to-previous: <gray><yellow>Нажмите</yellow>, чтобы перейти на предыдущую страницу.</gray>
    click-to-choose: <gray><yellow>Нажмите</yellow>, чтобы выбрать.</gray>
    click-to-toggle: <gray><yellow>Нажмите</yellow>, чтобы переключить.</gray>
    left-click-to-cycle-down: <gray><yellow>ЛКМ</yellow>, чтобы прокрутить вниз.</gray>
    right-click-to-cycle-up: <gray><yellow>ПКМ</yellow>, чтобы прокрутить вверх.</gray>

