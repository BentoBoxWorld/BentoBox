    PETS_STAY_AT_HOME:
      name: Питомцы остаются дома
      description: |-
        <green>Когда активно, прирученные питомцы</green>
        <green>могут перемещаться только по вашему</green>
        <green>острову и не могут его покинуть.</green>
    PISTON_PUSH:
      name: Защита от толкания поршнями
      description: |-
        <green>Включите это для предотвращения</green>
        <green>толкания блоков за пределы острова.</green>
    PLACE_BLOCKS:
      name: Установка блоков
      description: Переключает установку блоков
      hint: Установка блоков запрещена!
    PODZOL:
      name: Производство подзола
      description: |-
        <green>Если отключено, предотвратит производство</green>
        <green>подзола при росте больших деревьев</green>
    POTION_THROWING:
      name: Бросание зелий
      description: Переключает бросание зелий
      hint: Бросание зелий запрещено!
    NETHER_PORTAL:
      name: Портал в Незер
      description: Переключает телепортацию в Незер
      hint: Телепортация в Незер запрещена!
    END_PORTAL:
      name: Портал в Энд
      description: Переключает телепортацию в Энд
      hint: Телепортация в Энд запрещена!
    PAUSE_MOB_GROWTH:
      name: Приостановка роста мобов
      description: |-
        <green>Переключает использование золотого</green>
        <green>одуванчика для приостановки или</green>
        <green>возобновления роста детёнышей мобов</green>
      hint: Приостановка роста мобов запрещена!
    PRESSURE_PLATE:
      name: Нажимная плита
      description: |-
        <green>Переключает взаимодействие</green>
        <green>с нажимной плитой</green>
      hint: Взаимодействие с нажимными плитами запрещено!
    PVP_END:
      name: Урон по игрокам в Энде
      description: |-
        <red>Переключает урон по</red>
        <red>игрокам в Энде</red>
      hint: Урон по игрокам в Энде отключен!
      enabled: <red>Урон по игрокам в Энде был активирован.</red>
      disabled: <green>Урон по игрокам в Энде был деактивирован.</green>
    PVP_NETHER:
      name: Урон по игрокам в Незере
      description: |-
        <red>Переключает урон по</red>
        <red>игрокам в Незере</red>
      hint: Урон по игрокам в Незере отключен!
      enabled: <red>Урон по игрокам в Незере был активирован.</red>
      disabled: <green>Урон по игрокам в Незере был деактивирован.</green>
    PVP_OVERWORLD:
      name: Урон по игрокам в Верхнем мире
      description: |-
        <red>Переключает урон по</red>
        <red>игрокам в Верхнем мире</red>
      hint: Урон по игрокам в Верхнем мире отключен!
      enabled: <red>Урон по игрокам в Верхнем мире был активирован.</red>
      disabled: <green>Урон по игрокам в Верхнем мире был деактивирован.</green>
    REDSTONE:
      name: Редстоуновые механизмы
      description: |-
        <green>Переключает взаимодействие</green>
        <green>с редстоуновыми механизмами</green>
      hint: Взаимодействие с редстоуновыми механизмами запрещено!
    REMOVE_END_EXIT_ISLAND:
      name: Удалить выходной остров в Энде
      description: |-
        <green>Предотвращает генерацию</green>
        <green>выходного острова в Энде</green>
    REMOVE_MOBS:
      name: Удаление монстров
      description: |-
        <green>Удаляет монстров, когда вы</green>
        <green>телепортируетесь на остров</green>
    RIDING:
      name: Езда на животных
      description: Переключает езду на животных
      hint: Езда на животных запрещена!
    SHEARING:
      name: Стрижка
      description: Переключает стрижку
      hint: Стрижка запрещена!
    SPAWN_EGGS:
      name: Яйца призыва
      description: |-
        <green>Переключает использование</green>
        <green>яиц призыва</green>
      hint: Использование яиц призыва запрещено!
    SPAWNER_SPAWN_EGGS:
      name: Яйца призыва в рассаднике
      description: |-
        <green>Позволяет изменять тип сущности в рассаднике,</green>
        <green>используя яйцо призыва</green>
      hint: Изменение сущности в рассаднике запрещено!
    SCULK_SENSOR:
      name: Скалк-сенсор
      description: |-
        <green>Переключает активацию</green>
        <green>скалк-сенсора</green>
      hint: Активация скалк-сенсора запрещена!
    SCULK_SHRIEKER:
      name: Скалковый крикун
      description: |-
        <green>Переключает активацию</green>
        <green>скалкового крикуна</green>
      hint: Активация скалкового крикуна запрещена!
    SIGN_EDITING:
      name: Редактирование табличек
      description: |-
        <green>Переключает редактирование</green>
        <green>текста на табличках</green>
      hint: Редактирование табличек запрещено!
    TNT_DAMAGE:
      name: Урон от динамита
      description: |-
        <green>Позволяет динамиту и вагонеткам с динамитом</green>
        <green>взрывать блоки и наносить урон сущностям</green>
    TNT_PRIMING:
      name: Поджог динамита
      description: Предотвращает поджог динамита
      hint: Поджог динамита запрещён!
    TRADING:
      name: Торговля с крестьянинами
      description: |-
        <green>Переключает торговлю</green>
        <green>с крестьянинами</green>
      hint: Торговля с крестьянинами запрещена!
    TRAPDOOR:
      name: Люк
      description: |-
        <green>Переключает взаимодействие</green>
        <green>с люком</green>
      hint: Взаимодействие с люком запрещено!
    TREES_GROWING_OUTSIDE_RANGE:
      name: Рост деревьев за пределы острова
      description: |-
        <green>Переключает возможность деревьям</green>
        <green>расти за пределы острова.</green>

        <green>Активация позволит спавниться за островам листьям</green>
        <green>и древесине, а отключение также предотвратит посадку саженцев,</green>
        <green>но деревья будут выглядеть обрезанными</green>
    TURTLE_EGGS:
      name: Черепашье яйцо
      description: |-
        <green>Переключает разрушение</green>
        <green>черепашьих яиц</green>
      hint: Разрушение черепашьих яиц запрещено!
    FROST_WALKER:
      name: Ледоход
      description: |-
        <green>Переключает использование</green>
        <green>зачарования ледоход</green>
      hint: Использование зачарования ледоход здесь запрещено!
    EXPERIENCE_PICKUP:
      name: Подбор опыта
      description: |-
        <green>Переключает возможность</green>
        <green>подбирать опыт</green>
      hint: Подбор опыта запрещён!
    PREVENT_TELEPORT_WHEN_FALLING:
      name: Предотвращать телепортацию во время падения
      description: |-
        <green>Предотвращает использование команды телепортации</green>
        <green>назад на остров во время падения</green>
      hint: Вы не можете использовать это во время падения!
    VISITOR_KEEP_INVENTORY:
      name: Посетители сохраняют инвентарь после смерти
      description: |-
        <green>Предотвращает потерю посетителями инвентаря</green>
        <green>и опыта, если они умрут на чужом острове.</green>

        <green>Участники острова всё ещё будут терять вещи,</green>
        <green>если будут умирать на своём острове</green>
    SPAWN_PROTECTION:
      name: Защита от пустоты
      description: |-
        <green>Если включено, игроки, упавшие в пустоту,</green>
        <green>будут телепортированы обратно на точку</green>
        <green>спавна вместо смерти.</green>
    RAID_TRIGGER:
      name: Рейд
      description: |-
        <green>Устанавливает минимальный</green>
        <green>ранг для запуска рейда</green>
      hint: Запуск рейда запрещён!
    ENTITY_PORTAL_TELEPORT:
      name: Использование портала сущностями
      description: |-
        <green>Активация позволит сущностям</green>
        <green>использовать портал между измерениями</green>
    WIND_CHARGE:
      name: Заряд ветра
      description: |-
        <green>Переключает использование</green>
        <green>зарядов ветра</green>
      hint: Использование зарядов ветра запрещено!
    WITHER_DAMAGE:
      name: Урон от Визера
      description: |-
        <green>Активация позволит Визеру разрушать</green>
        <green>блоки и наносить урон сущностям</green>
    WORLD_BLOCK_EXPLODE_DAMAGE:
      name: Разрушение блоков взрывом кровати
      description: |-
        <green>Позволяет кроватям и якорю возрождения</green>
        <green>разрушать блоки и наносить урон сущностям</green>
        <green>за пределами острова</green>
    WORLD_TNT_DAMAGE:
      name: Разрушение блоков через динамит
      description: |-
        <green>Позволяет динамиту и вагонетке с динамитом</green>
        <green>разрушать блоки и наносить урон сущностям</green>
        <green>за пределами острова</green>
  locked: <red>Этот остров заблокирован!</red>
  locked-island-bypass: <gold>Этот [prefix_island] заблокирован, но у вас есть разрешение на вход.</gold>
