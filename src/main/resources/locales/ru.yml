    WORLD_DEFAULTS:
      title: <gold><aqua>[world_name] </aqua>защита мира</gold>
      description: |
        <green>Настройки защиты для случаев,</green>
        <green>когда игроки вне их острова</green>
    flag-item:
      name-layout: <green>[name]</green>
