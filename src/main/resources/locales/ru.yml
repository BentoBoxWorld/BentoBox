        <green>Сбрасывает <red><bold>ВСЕ </bold></red>настройки к их</green>
        <green>значениям по умолчанию.</green>
      confirm: подтвердить
      instructions: <green>Введите <red>"подтвердить"</red>, чтобы сбросить все.</green>
    PROTECTION:
      title: <gold>Основные настройки</gold>
