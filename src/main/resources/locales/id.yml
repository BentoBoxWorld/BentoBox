          <green>Berhasil menghapus </green><aqua>[number] </aqua><green>yang disetel ulang dari pulau </green><aqua></aqua>
          [name]<green>, mengurangi total menjadi </green><aqua>[total]</aqua><green>yang disetel ulang.</green>
