            <green>이 환경에서는 대부분의 기능이 원활하게 실행됩니다.</green>
          NOT_SUPPORTED: |-
            <yellow>[name] [version]</yellow><green>에서 구동중 입니다.</green>

            <green>BentoBox는 현재 지원하지 않는 서버 소프트웨어 및 버전에서 실행 중입니다.</green>

            <green>이 환경에서는 대부분의 기능이 원활하게 작동되지 않고 오류가 발생할수 있습니다</green>
          INCOMPATIBLE: |-
            <yellow>[name] [version]</yellow><green>에서 구동중 입니다.</green>

            <green>BentoBox는 현재 지원하지 않는 서버 소프트웨어 및 버전에서 실행 중입니다.</green>

