name: SonarQube
on:
  push:
    branches:
      - develop
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      # BentoBox must be compiled with Java 25 (Minecraft 26.x), but the Sonar scanner only
      # supports running on Java 21. Install both: JDK 21 is set up last so JAVA_HOME points
      # at it, making the Gradle daemon (and the in-process :sonar task) run on Java 21, while
      # the Java 25 toolchain (resolved via fromEnv below) compiles and tests the code.
      - name: Set up JDK 25 (compilation toolchain)
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'zulu'
      - name: Set up JDK 21 (Gradle daemon + Sonar scanner runtime)
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'zulu'
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # Compile/test on the Java 25 toolchain (discovered from the JDK 25 install via
        # JAVA_HOME_25_X64); the daemon and Sonar scanner stay on the Java 21 JAVA_HOME.
        run: ./gradlew build test jacocoTestReport sonar --info -Porg.gradle.java.installations.fromEnv=JAVA_HOME_25_X64
